<svg width="2172" height="350" viewBox="0 0 2172 350" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Operating Principle</title>
  <desc id="desc">Research to prototype to measure to ship, with four steps: research what matters, build the sharp prototype, measure it honestly, and ship what survives.</desc>
