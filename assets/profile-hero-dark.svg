<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">Amaar Chughtai</title>
  <desc id="desc">AI systems, optimizer research, and developer tools</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="58%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#17132b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="54%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#e2e8f0" stroke-opacity=".045" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="360" rx="34" fill="url(#bg)"/>
  <rect width="1280" height="360" rx="34" fill="url(#grid)"/>
  <circle cx="1100" cy="174" r="180" fill="#1d4ed8" opacity=".10" filter="url(#softGlow)"/>
  <circle cx="1004" cy="128" r="118" fill="#7c3aed" opacity=".10" filter="url(#softGlow)"/>

  <g transform="translate(820 86)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M30 144 C100 74 175 224 244 126 C294 55 352 78 410 128" fill="none" stroke="url(#accent)" stroke-width="4" opacity=".9"/>
    <path d="M30 206 C105 146 176 285 258 190 C304 137 356 142 412 184" fill="none" stroke="#cbd5e1" stroke-width="2" opacity=".18"/>
    <g fill="#020617" stroke="#38bdf8" stroke-width="3">
      <circle cx="30" cy="144" r="8"/>
      <circle cx="148" cy="145" r="8"/>
      <circle cx="244" cy="126" r="8"/>
      <circle cx="330" cy="95" r="8"/>
      <circle cx="410" cy="128" r="8"/>
    </g>
    <g fill="#020617" stroke="#a78bfa" stroke-width="2.5" opacity=".95">
      <circle cx="78" cy="203" r="6"/>
      <circle cx="258" cy="190" r="6"/>
      <circle cx="369" cy="154" r="6"/>
    </g>
  </g>

  <g transform="translate(790 96)">
    <rect x="0" y="0" width="396" height="178" rx="22" fill="#020617" opacity=".82" stroke="#1e293b"/>
    <circle cx="32" cy="32" r="6" fill="#fb7185"/>
    <circle cx="54" cy="32" r="6" fill="#fbbf24"/>
    <circle cx="76" cy="32" r="6" fill="#34d399"/>
    <text x="32" y="72" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" fill="#e2e8f0">$ research-loop</text>
    <text x="32" y="106" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#94a3b8">hypothesis -> code -> sweep</text>
    <text x="32" y="136" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#94a3b8">fastmuon.ns_steps = [3, 4, 5]</text>
  </g>

  <g transform="translate(74 72)">
    <rect x="0" y="0" width="142" height="32" rx="16" fill="#082f49"/>
    <text x="18" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#7dd3fc" letter-spacing=".9">AI SYSTEMS</text>
    <text x="0" y="92" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="58" font-weight="760" fill="#f8fafc">Amaar Chughtai</text>
    <text x="0" y="136" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" fill="#cbd5e1">optimizer research, agent tooling, and product engineering</text>
    <rect x="0" y="178" width="520" height="3" rx="2" fill="url(#accent)"/>
    <text x="0" y="224" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" fill="#94a3b8">fast prototypes -> measured evidence -> useful systems</text>
  </g>
</svg>
